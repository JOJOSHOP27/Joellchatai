<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>JOELL AI · Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --bg-primary: #0b0e14;
            --bg-secondary: #141820;
            --bg-card: #1c222c;
            --text-primary: #f0f4ff;
            --text-secondary: #a8b5cf;
            --text-muted: #6b7e9e;
            --border-subtle: #2a3340;
            --accent: #10a37f;
            --accent-glow: rgba(16, 163, 127, 0.25);
            --radius: 18px;
            --radius-sm: 12px;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 96vh;
            max-height: 800px;
        }
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 12px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }
        .top-header .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-primary);
        }
        .top-header .logo-area img {
            height: 38px;
            width: auto;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px;
            border: 1px solid var(--border-subtle);
        }
        .top-header .logo-area span {
            background: linear-gradient(135deg, var(--accent), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10a37f;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .chat-container {
            flex: 1;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 20px;
        }
        .message {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            animation: fadeIn 0.25s ease;
            line-height: 1.5;
            font-size: 0.92rem;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .message.bot .msg-label {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message .timestamp {
            font-size: 0.6rem;
            opacity: 0.35;
            margin-top: 4px;
            text-align: right;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            gap: 4px;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.2s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        .input-wrapper {
            flex-shrink: 0;
            padding: 12px 16px 14px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            display: flex;
            gap: 10px;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.92rem;
            outline: none;
            transition: 0.2s;
        }
        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }
        .input-wrapper button {
            background: var(--accent);
            border: none;
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-wrapper button:hover {
            background: #0d8c6a;
            box-shadow: 0 0 18px var(--accent-glow);
        }
        .input-wrapper button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px 16px 10px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .suggestion-chips .chip {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .suggestion-chips .chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(16, 163, 127, 0.08);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: 0;
            }
        }
        @media (max-width: 600px) {
            .app-container {
                max-height: none;
                height: 100vh;
                padding: 0;
            }
            body {
                padding: 8px;
            }
            .top-header .logo-area {
                font-size: 1.1rem;
            }
            .top-header .logo-area img {
                height: 30px;
            }
            .message {
                max-width: 92%;
                font-size: 0.88rem;
            }
            .input-wrapper {
                padding: 8px 12px 12px;
            }
            .input-wrapper input {
                font-size: 0.85rem;
                padding: 10px 14px;
            }
            .input-wrapper button {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }
            .suggestion-chips {
                padding: 4px 12px 8px;
                gap: 6px;
            }
            .suggestion-chips .chip {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
        }
        @media (max-width: 400px) {
            .suggestion-chips .chip {
                font-size: 0.6rem;
                padding: 3px 8px;
            }
            .input-wrapper input {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
            .input-wrapper button {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <div class="logo-area">
                <img src="https://files.catbox.moe/ijemcy.png" alt="logo" />
                <span>JOELL AI</span>
            </div>
            <span class="status-badge">
                <span class="dot"></span> Online
            </span>
        </header>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="msg-label"><i class="fas fa-robot"></i> JOELL AI</div>
                    Halo! Saya JOELL AI. Saya siap membantu Anda dengan berbagai pertanyaan. Ada yang bisa saya bantu?
                    <div class="timestamp">Sekarang</div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
            <div class="suggestion-chips">
                <span class="chip" data-msg="Apa saja produk yang tersedia?">📦 Produk</span>
                <span class="chip" data-msg="Bagaimana cara pembayaran?">💳 Pembayaran</span>
                <span class="chip" data-msg="Bantu saya memilih hosting">🖥️ Hosting</span>
                <span class="chip" data-msg="Cara order via WhatsApp?">📱 Order</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." />
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  API KEY OPENAI (dari kamu)
        // ============================================================
        const API_KEY = 'sk-proj-qrLTifE-sRgegJvOmoAS0PvyX7QQitbBdEf-Cnbuw0hr9Za4kRtIilVoxV5EPaYTESTdYwIo78T3BlbkFJ3PxeX2vuYG9ZEBGyY8bhTbW5--yYgohMg1x-T0hvoK4Lj3aemvJtojXc-9lsbJOesXRUSRsdkA';

        // ============================================================
        //  ELEMEN DOM
        // ============================================================
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // ============================================================
        //  KIRIM KE OPENAI via CORS PROXY (biar jalan di browser)
        // ============================================================
        async function sendToOpenAI(userMessage) {
            const url = 'https://api.openai.com/v1/chat/completions';

            const payload = {
                model: 'gpt-4o-mini',
                messages: [
                    { role: 'system', content: 'Kamu adalah JOELL AI, asisten virtual yang ramah dan profesional. Gunakan bahasa Indonesia yang baik dan benar.' },
                    { role: 'user', content: userMessage }
                ],
                temperature: 0.7,
                max_tokens: 500
            };

            try {
                // === PAKAI CORS PROXY AGAR BISA DIPANGGIL DARI BROWSER ===
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);

                const res = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // API key dikirim di body karena proxy tidak support header Authorization
                    },
                    body: JSON.stringify({
                        ...payload,
                        api_key: API_KEY // dikirim di body untuk proxy
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || 'API error');
                }

                const data = await res.json();
                return data.choices?.[0]?.message?.content || 'Maaf, saya tidak bisa menjawab.';
            } catch (e) {
                console.error('OpenAI Error:', e);
                return `⚠️ Terjadi kesalahan: ${e.message}. Coba lagi nanti.`;
            }
        }

        // ============================================================
        //  FUNGSI CHAT
        // ============================================================
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            if (sender === 'bot') {
                const label = document.createElement('div');
                label.className = 'msg-label';
                label.innerHTML = '<i class="fas fa-robot"></i> JOELL AI';
                div.appendChild(label);

                const content = document.createElement('div');
                content.textContent = text;
                div.appendChild(content);
            } else {
                div.textContent = text;
            }

            const ts = document.createElement('div');
            ts.className = 'timestamp';
            ts.textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            div.appendChild(ts);

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'flex' : 'none';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSend() {
            const msg = chatInput.value.trim();
            if (!msg) return;

            chatInput.value = '';
            addMessage(msg, 'user');
            sendBtn.disabled = true;
            showTyping(true);

            const reply = await sendToOpenAI(msg);
            showTyping(false);
            addMessage(reply, 'bot');
            sendBtn.disabled = false;
        }

        // ============================================================
        //  EVENT LISTENERS
        // ============================================================
        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        });

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', function() {
                chatInput.value = this.dataset.msg;
                handleSend();
            });
        });

        chatInput.focus();
    </script>
</body>
                                              </html>
