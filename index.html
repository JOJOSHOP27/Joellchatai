<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOELL SHOP - AI Customer Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            max-height: 800px;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== HEADER ===== */
        .chat-header {
            background: linear-gradient(135deg, #0b1a2a 0%, #1a2f44 100%);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: #0b1a2a;
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-info .status {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 2px;
        }

        .header-info .status .dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .header-actions i {
            cursor: pointer;
            transition: 0.2s;
            padding: 4px;
        }

        .header-actions i:hover {
            color: white;
        }

        /* ===== MESSAGES AREA ===== */
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px 12px;
            background: #f8f9fc;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .messages-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .messages-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-wrapper::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        .message {
            max-width: 88%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            animation: slideIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.bot {
            background: white;
            border: 1px solid #eef2f6;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .message.user {
            background: linear-gradient(135deg, #0b1a2a, #1a2f44);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
        }

        .message.bot .msg-header i {
            color: #f7971e;
        }

        .message.user .msg-header {
            color: rgba(255, 255, 255, 0.6);
        }

        .message .msg-text {
            font-size: 14px;
        }

        .message .msg-text strong {
            color: #f7971e;
        }

        .message .msg-time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 6px;
            display: block;
            text-align: right;
        }

        .message.user .msg-time {
            color: rgba(255, 255, 255, 0.5);
        }

        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: white;
            border: 1px solid #eef2f6;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            padding: 14px 20px;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #b0b8c4;
            border-radius: 50%;
            display: inline-block;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* ===== INPUT AREA (FIXED / STICKY) ===== */
        .input-area {
            padding: 16px 18px 20px;
            background: white;
            border-top: 1px solid #eef2f6;
            flex-shrink: 0;
            /* Ini membuat input area tetap di bawah, tidak ikut scroll */
            position: sticky;
            bottom: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f1f4f9;
            border-radius: 30px;
            padding: 4px 4px 4px 18px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #0b1a2a;
            background: white;
            box-shadow: 0 0 0 4px rgba(11, 26, 42, 0.06);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #0b1a2a;
        }

        .input-wrapper input::placeholder {
            color: #9ca3af;
        }

        .input-wrapper button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #0b1a2a, #1a2f44);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .input-wrapper button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(11, 26, 42, 0.3);
        }

        .input-wrapper button:active {
            transform: scale(0.92);
        }

        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .input-wrapper button .fa-spinner {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== FOOTER ===== */
        .footer-bar {
            text-align: center;
            font-size: 10px;
            color: #9ca3af;
            padding: 8px 0 14px;
            background: white;
            border-top: 1px solid #f1f5f9;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }

        .footer-bar i {
            color: #f7971e;
            margin: 0 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            body { padding: 0; }
            .chat-container {
                border-radius: 0;
                height: 100vh;
                max-height: 100vh;
            }
            .messages-wrapper {
                padding: 16px 14px 8px;
            }
            .input-area {
                padding: 12px 14px 16px;
            }
        }

        @media (max-width: 400px) {
            .message {
                max-width: 94%;
                font-size: 13px;
                padding: 10px 14px;
            }
            .header-info h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- HEADER -->
    <div class="chat-header">
        <div class="header-avatar">J</div>
        <div class="header-info">
            <h1>JOELL SHOP</h1>
            <div class="status">
                <span class="dot"></span>
                AI siap membantu
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-rotate-right" id="resetBtn" title="Mulai ulang chat"></i>
        </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-wrapper" id="messagesWrapper">
        <div class="message bot">
            <div class="msg-header">
                <i class="fas fa-robot"></i> JOELL SHOP AI
            </div>
            <div class="msg-text">
                Halo! Selamat datang di <strong>JOELL SHOP</strong> 👋<br />
                Saya asisten AI siap membantu soal produk, stok, pengiriman, atau rekomendasi. Ada yang bisa saya bantu?
            </div>
            <span class="msg-time">Sekarang</span>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- INPUT AREA (STICKY / TIDAK IKUT SCROLL) -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Tanyakan soal produk..." autofocus />
            <button id="sendBtn" aria-label="Kirim pesan">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="footer-bar">
        <i class="fas fa-bolt"></i> Didukung Google Gemini AI
    </div>
</div>

<script>
    (function() {
        // ===== KONFIGURASI =====
        const API_KEY = 'AQ.Ab8RN6KOq2wQtrn9akB-epSi2awcQxL8k0fTFd0FsRZZg1AsCA';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

        // ===== DOM ELEMENTS =====
        const messagesWrapper = document.getElementById('messagesWrapper');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const resetBtn = document.getElementById('resetBtn');

        // ===== FUNGSI =====
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            const header = document.createElement('div');
            header.className = 'msg-header';

            if (sender === 'bot') {
                header.innerHTML = '<i class="fas fa-robot"></i> JOELL SHOP AI';
            } else {
                header.innerHTML = '<i class="fas fa-user"></i> Anda';
            }
            div.appendChild(header);

            const textDiv = document.createElement('div');
            textDiv.className = 'msg-text';
            if (sender === 'bot') {
                textDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            } else {
                textDiv.textContent = text;
            }
            div.appendChild(textDiv);

            const time = document.createElement('span');
            time.className = 'msg-time';
            time.textContent = new Date().toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            });
            div.appendChild(time);

            // Insert before typing indicator
            messagesWrapper.insertBefore(div, typingIndicator);
            messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
        }

        function showTyping() {
            typingIndicator.style.display = 'flex';
            messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            userInput.disabled = isLoading;
            if (isLoading) {
                sendBtn.innerHTML = '<i class="fas fa-spinner"></i>';
            } else {
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            }
        }

        function resetChat() {
            // Hapus semua pesan kecuali yang pertama (bot) dan typing indicator
            const messages = messagesWrapper.querySelectorAll('.message');
            messages.forEach((msg, index) => {
                if (index > 0) msg.remove();
            });
            // Reset typing
            hideTyping();
            // Fokus input
            userInput.focus();
            // Scroll ke atas
            messagesWrapper.scrollTop = 0;
        }

        // ===== KIRIM PESAN KE GEMINI =====
        async function sendToGemini(userMessage) {
            try {
                showTyping();
                setLoading(true);

                const systemPrompt = `
                Anda adalah asisten AI untuk JOELL SHOP, toko online yang menjual fashion, aksesoris, dan gadget.
                Tugas: membantu pelanggan dengan ramah, informatif, dan solutif.
                - Produk: berikan rekomendasi sesuai tren atau kebutuhan.
                - Stok: katakan "Stok tersedia" atau "Sedang habis, akan restock minggu depan".
                - Pengiriman: estimasi 2-4 hari kerja, tersedia JNE & POS.
                - Harga: sebutkan kisaran harga (contoh: mulai Rp 150.000).
                - Jangan sebutkan bahwa Anda adalah AI dari Google atau Gemini.
                - Jawab dalam bahasa Indonesia natural, sopan, maksimal 3-4 kalimat.
                `;

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [{ text: `${systemPrompt}\n\nPertanyaan: ${userMessage}` }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 300,
                        topP: 0.9,
                    }
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let errorMsg = `Error ${response.status}`;
                    try {
                        const errData = await response.json();
                        if (errData.error?.message) errorMsg = errData.error.message;
                    } catch (_) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

                if (!text) throw new Error('Respons AI kosong.');

                // Bersihkan jika system prompt terbawa
                let clean = text;
                if (clean.includes('Pertanyaan:')) {
                    const parts = clean.split('Pertanyaan:');
                    if (parts.length > 1) clean = parts[1].trim();
                }
                return clean;

            } catch (error) {
                console.error('Gemini Error:', error);
                return `Maaf, saya mengalami gangguan teknis. 🙏\nError: ${error.message || 'Unknown'}`;
            } finally {
                hideTyping();
                setLoading(false);
            }
        }

        // ===== HANDLE SEND =====
        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            userInput.focus();

            const reply = await sendToGemini(message);
            addMessage(reply, 'bot');
        }

        // ===== EVENT LISTENERS =====
        sendBtn.addEventListener('click', handleSend);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        resetBtn.addEventListener('click', resetChat);

        // Focus saat load
        window.addEventListener('load', () => {
            userInput.focus();
        });

        // ===== TEST API KEY (opsional, tidak mengganggu) =====
        async function testApi() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: 'Halo' }] }],
                        generationConfig: { maxOutputTokens: 5 }
                    })
                });
                if (!res.ok) console.warn('⚠️ API Key mungkin bermasalah.');
            } catch (_) {}
        }
        // testApi();

    })();
</script>

</body>
</html>
